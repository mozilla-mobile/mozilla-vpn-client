---
task-defaults:
    treeherder:
        symbol: B
        kind: build
        tier: 1
    fetches:
        build:
            - artifact: mozillavpn-sources.tar.gz
    dependencies:
        build: build-source/vpn
    worker-type: b-linux
    worker:
        max-run-time: 3600
        chain-of-trust: true
        artifacts:
            - type: directory
              name: public/build
              path: /builds/worker/artifacts
    run:
        using: run-task
        use-caches: [checkout, pip]
        command: /builds/worker/builder.sh

linux/ubuntu:
    description: "Linux Build (Ubuntu)"
    treeherder:
        platform: linux/ubuntu
    worker:
        docker-image: {in-tree: linux-build-ubuntu}
    add-index-routes:
        name: linux-ubuntu
        type: build

linux/fedora:
    description: "Linux Build (Fedora)"
    treeherder:
        platform: linux/fedora
    worker:
        docker-image: {in-tree: linux-build-fedora}
    add-index-routes:
        name: linux-fedora
        type: build

linux64/release-deb:
    description: "Linux Build (Debian/Static Qt)"
    treeherder:
        platform: linux-x86_64/deb
    fetches:
        toolchain:
            - qt-linux
    worker:
        docker-image: {in-tree: linux-qt6-build}
    add-index-routes:
        name: linux-static
        type: build
    run:
        command: /builds/worker/builder.sh -s

linux-aarch64/release-deb:
    description: "Linux Build (Debian/aarch64 cross-compile, Static Qt)"
    treeherder:
        platform: linux-aarch64/deb
    fetches:
        toolchain:
            - qt-linux-aarch64
            - qt-tools-6.10
    worker:
        docker-image: {in-tree: linux-aarch64-deb-build}
    add-index-routes:
        name: linux-aarch64-static-deb
        type: build
    run:
        command: /builds/worker/builder.sh --deb-host-arch arm64

linux64/release-rpm:
    description: "Linux Build (RPM/Static Qt)"
    treeherder:
        platform: linux-x86_64/rpm
    fetches:
        toolchain:
            - qt-linux
    worker:
        docker-image: {in-tree: linux-rpm-build}
    run:
        command: /builds/worker/builder.sh -s
