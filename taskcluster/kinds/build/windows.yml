---
task-defaults:
    treeherder:
        symbol: B
        kind: build
        tier: 1
    worker-type: b-linux
    fetches:
        fetch:
            - wireguard-nt
        toolchain:
            - conda-windows-cross
            - cargo-vendor
    worker:
        docker-image: {in-tree: conda-base}
        taskcluster-proxy: true
        chain-of-trust: true
        max-run-time: 3600
        artifacts:
            - type: directory
              name: public/build
              path: /builds/worker/artifacts
    release-artifacts:
        - unsigned.zip
    run:
        using: run-task
        cwd: '{checkout}'

windows-x86_64/opt:
    description: "Windows Build (Release/x86_64)"
    fetches:
        toolchain:
            - qt-windows-x86_64-6.10
            - qt-tools-6.10
    treeherder:
        platform: windows/x86_64
    run:
        command: ./taskcluster/scripts/build/windows_cross.sh x86_64

windows-aarch64/opt:
    description: "Windows Build (Release/aarch64)"
    fetches:
        toolchain:
            - qt-windows-aarch64-6.10
            - qt-tools-6.10
    treeherder:
        platform: windows/aarch64
    run:
        command: ./taskcluster/scripts/build/windows_cross.sh aarch64
