---

loader: taskgraph.loader.transform:loader

transforms:
    - mozillavpn_taskgraph.transforms.requires_level:transforms
    - taskgraph.transforms.run:transforms
    - taskgraph.transforms.task:transforms

kind-dependencies:
    - build

task-defaults:
    worker-type: b-linux
    worker:
        docker-image: {in-tree: sentry}
        taskcluster-proxy: true
        chain-of-trust: true
        max-run-time: 3600
    treeherder:
        symbol: SYM
        kind: other
        tier: 1
    fetches:
        build:
            - MozillaVPN-dsym.tar.xz
    run:
        using: run-task
        checkout: false
        use-caches: []
        command: /builds/worker/sentry_upload.sh
    requires-level: 3
    scopes:
        - secrets:get:project/mozillavpn/level-1/sentry

tasks:
    macos/opt:
        description: Upload macOS symbols to Sentry
        treeherder:
            platform: macos/universal
        dependencies:
            build: build-macos/opt

    windows-x86_64/opt:
        description: Upload Windows/x86_64 symbols to Sentry
        treeherder:
            platform: windows/x86_64
        dependencies:
            build: build-windows-x86_64/opt

    windows-aarch64/opt:
        description: Upload Windows/aarch64 symbols to Sentry
        treeherder:
            platform: windows/aarch64
        dependencies:
            build: build-windows-aarch64/opt
