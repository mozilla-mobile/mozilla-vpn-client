app-id: org.mozilla.vpn
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: mozillavpn
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --system-talk-name=org.freedesktop.NetworkManager
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
modules:
  # Dependency for jsonschema, needs to be installed as a
  # binary wheel because it has a bunch of complex rust dependencies that are
  # difficult to replicate offline.
  - name: python3-pyyaml
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "PyYAML" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/74/27/e5b8f34d02d9995b80abcef563ea1f8b56d20134d8f4e5e81733b1feceb2/pyyaml-6.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl
        sha256: 0f29edc409a6392443abf94b9cf89ce99889a1dd5376d94316ae5145dfedd5d6
        only_arches:
          - x86_64
      - type: file
        url: https://files.pythonhosted.org/packages/50/31/b20f376d3f810b9b2371e72ef5adb33879b25edb7a6d072cb7ca0c486398/pyyaml-6.0.3-cp313-cp313-manylinux2014_aarch64.manylinux_2_17_aarch64.manylinux_2_28_aarch64.whl
        sha256: ee2922902c45ae8ccada2c5b501ab86c36525b883eff4255313a253a3160861c
        only_arches:
          - aarch64
    cleanup:
      - '*'

  - name: qt5compat
    buildsystem: cmake-ninja
    sources:
      - type: git
        tag: v6.10.1
        url: https://github.com/qt/qt5compat

  - name: mozillavpn
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_FLATPAK=ON
    sources:
      - type: dir
        path: ../..
        skip:
          - .flatpak-builder
          - .git

      # Install vendored Rust crates
      - flatpak-vpn-crates.json
      - type: shell
        commands:
          - mkdir .cargo
          - cp cargo/config .cargo/config.toml
